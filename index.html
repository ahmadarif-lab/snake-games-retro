<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RETRO SNAKE // OBSTACLE ZONE</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%90%8D</text></svg>" />
<style>
  :root {
    --bg:        #05140a;
    --bg-2:      #071d0d;
    --green:     #39ff8a;
    --green-dim: #1f6b33;
    --green-mid: #2fa34d;
    --amber:     #ffcf3f;
    --danger:    #ff3b6b;
    --scan:      rgba(0,0,0,0.28);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: radial-gradient(circle at 50% 30%, #0a2413 0%, var(--bg) 70%);
    color: var(--green);
    font-family: "Courier New", ui-monospace, monospace;
    -webkit-font-smoothing: none;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
  }

  .cabinet {
    width: min(96vw, 660px);
    padding: 22px 22px 26px;
    background: linear-gradient(180deg, #0c2814, #06170c);
    border: 3px solid var(--green-mid);
    border-radius: 14px;
    box-shadow:
      0 0 0 2px #04120a inset,
      0 0 22px rgba(57,255,138,0.25),
      0 18px 50px rgba(0,0,0,0.6);
    position: relative;
  }

  .title {
    text-align: center;
    margin: 0 0 4px;
    font-size: clamp(18px, 4.4vw, 30px);
    letter-spacing: 4px;
    font-weight: bold;
    text-shadow: 0 0 8px rgba(57,255,138,0.9), 0 0 22px rgba(57,255,138,0.4);
  }
  .subtitle {
    text-align: center;
    margin: 0 0 14px;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--green-mid);
    text-transform: uppercase;
  }

  .hud {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 12px;
    letter-spacing: 1px;
  }
  .hud .box {
    flex: 1;
    text-align: center;
    padding: 7px 4px;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--green-dim);
    border-radius: 6px;
  }
  .hud .label { color: var(--green-mid); font-size: 9px; display:block; letter-spacing:2px; }
  .hud .val   { font-size: 17px; text-shadow: 0 0 6px rgba(57,255,138,0.6); }
  .hud .val.danger { color: var(--danger); text-shadow: 0 0 6px rgba(255,59,107,0.7); }

  .screen-wrap {
    position: relative;
    border: 3px solid var(--green-mid);
    border-radius: 8px;
    background: var(--bg-2);
    box-shadow: 0 0 18px rgba(57,255,138,0.18) inset;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: auto;
    image-rendering: pixelated;
  }

  /* CRT scanlines + flicker overlay */
  .scanlines {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      var(--scan) 3px,
      var(--scan) 3px
    );
    mix-blend-mode: multiply;
    animation: flicker 4s infinite;
  }
  .vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.45) 100%);
  }
  @keyframes flicker {
    0%,100% { opacity: 0.85; }
    50%     { opacity: 0.95; }
    52%     { opacity: 0.8; }
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 10px;
    background: rgba(3,14,8,0.82);
    padding: 20px;
    z-index: 5;
  }
  .overlay.hidden { display: none; }
  .overlay h2 {
    margin: 0;
    font-size: clamp(20px, 6vw, 34px);
    letter-spacing: 3px;
    text-shadow: 0 0 12px rgba(57,255,138,0.8);
  }
  .overlay h2.dead { color: var(--danger); text-shadow: 0 0 12px rgba(255,59,107,0.8); }
  .overlay p { margin: 0; font-size: 12px; line-height: 1.9; color: var(--green-mid); letter-spacing:1px;}
  .blink { animation: blink 1s steps(2, start) infinite; font-size: 13px; color: var(--amber); }
  @keyframes blink { 0%,50%{opacity:1;} 51%,100%{opacity:0;} }

  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
    margin-top: 14px;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--green-mid);
  }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .swatch { width: 12px; height: 12px; border-radius: 2px; display:inline-block; }

  .keys {
    text-align:center;
    margin-top:12px;
    font-size:10px;
    letter-spacing:2px;
    color: var(--green-dim);
  }
  .keys b { color: var(--green-mid); }
</style>
</head>
<body>
  <div class="cabinet">
    <h1 class="title">RETRO&nbsp;SNAKE</h1>
    <p class="subtitle">&laquo; obstacle zone &raquo;</p>

    <div class="hud">
      <div class="box"><span class="label">SCORE</span><span class="val" id="score">0</span></div>
      <div class="box"><span class="label">HIGH</span><span class="val" id="high">0</span></div>
      <div class="box"><span class="label">LEVEL</span><span class="val" id="level">1</span></div>
      <div class="box"><span class="label">ENEMY</span><span class="val danger" id="enemies">0</span></div>
    </div>

    <div class="screen-wrap">
      <canvas id="game" width="600" height="520"></canvas>
      <div class="scanlines"></div>
      <div class="vignette"></div>

      <div class="overlay" id="overlay">
        <h2 id="ovTitle">READY?</h2>
        <p id="ovText">
          Makan buah kuning untuk tumbuh &amp; naik level.<br>
          Hindari <b style="color:var(--green-mid)">tembok</b>, <b style="color:var(--green-mid)">obstacle</b>, dan <b style="color:var(--danger)">musuh</b>.
        </p>
        <p class="blink" id="ovHint">TEKAN ENTER / KLIK UNTUK MULAI</p>
      </div>
    </div>

    <div class="legend">
      <span><i class="swatch" style="background:#b6ffcf"></i>Kepala</span>
      <span><i class="swatch" style="background:#39ff8a"></i>Ular</span>
      <span><i class="swatch" style="background:#ffcf3f"></i>Buah</span>
      <span><i class="swatch" style="background:#2fa34d"></i>Tembok/Obstacle</span>
      <span><i class="swatch" style="background:#ff3b6b"></i>Musuh</span>
    </div>

    <p class="keys">
      GERAK: <b>&uarr; &darr; &larr; &rarr;</b> / <b>WASD</b> &nbsp;&middot;&nbsp;
      JEDA: <b>SPACE</b> &nbsp;&middot;&nbsp; MULAI/ULANG: <b>ENTER</b>
    </p>
  </div>

<script>
(() => {
  "use strict";

  // ---------- Konfigurasi grid ----------
  const COLS = 30;
  const ROWS = 26;
  const CELL = 20;                      // 600 x 520 px
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  // ---------- Elemen HUD ----------
  const el = {
    score:   document.getElementById("score"),
    high:    document.getElementById("high"),
    level:   document.getElementById("level"),
    enemies: document.getElementById("enemies"),
    overlay: document.getElementById("overlay"),
    ovTitle: document.getElementById("ovTitle"),
    ovText:  document.getElementById("ovText"),
    ovHint:  document.getElementById("ovHint"),
  };

  const key = (x, y) => x + "," + y;

  // ---------- Obstacle (tembok batas + halangan tengah) ----------
  const walls = new Set();

  function addRect(x0, y0, x1, y1) {
    for (let y = y0; y <= y1; y++)
      for (let x = x0; x <= x1; x++)
        walls.add(key(x, y));
  }

  function buildWalls() {
    walls.clear();
    // Tembok batas area (mengelilingi seluruh sisi)
    for (let x = 0; x < COLS; x++) { walls.add(key(x, 0)); walls.add(key(x, ROWS - 1)); }
    for (let y = 0; y < ROWS; y++) { walls.add(key(0, y)); walls.add(key(COLS - 1, y)); }

    // Halangan di tengah — simetris. Baris tengah (12-14) SELALU dibuat bersih
    // sebagai lajur aman tempat ular memulai.
    // Empat blok sudut dalam
    addRect(4, 4, 8, 5);
    addRect(COLS - 9, 4, COLS - 5, 5);
    addRect(4, ROWS - 6, 8, ROWS - 5);
    addRect(COLS - 9, ROWS - 6, COLS - 5, ROWS - 5);

    // Palang tengah atas & bawah
    addRect(13, 4, 16, 5);
    addRect(13, ROWS - 6, 16, ROWS - 5);

    // Empat pilar vertikal (berhenti sebelum baris 12 & lanjut setelah 14)
    addRect(9, 8, 10, 11);
    addRect(9, 15, 10, 18);
    addRect(COLS - 11, 8, COLS - 10, 11);
    addRect(COLS - 11, 15, COLS - 10, 18);
  }

  const isWall = (x, y) => walls.has(key(x, y));
  const inBounds = (x, y) => x >= 0 && y >= 0 && x < COLS && y < ROWS;

  // ---------- State game ----------
  let snake, dir, nextDir, food, enemies;
  let score, high, level, foodEaten;
  let stepMs, acc, lastTs, tickCount;
  let state = "ready";  // ready | playing | paused | over

  high = Number(localStorage.getItem("retroSnakeHigh") || 0);
  el.high.textContent = high;

  const START_STEP_MS = 130;
  const MIN_STEP_MS = 65;
  const ENEMY_EVERY  = 2;   // musuh bergerak tiap 2 langkah ular (lebih lambat = fair)

  function cellFree(x, y, opts = {}) {
    // Sel dianggap "kosong" untuk penempatan objek baru.
    if (!inBounds(x, y) || isWall(x, y)) return false;
    if (!opts.allowSnake && snake && snake.some(s => s.x === x && s.y === y)) return false;
    if (!opts.allowFood && food && food.x === x && food.y === y) return false;
    if (!opts.allowEnemy && enemies && enemies.some(e => e.x === x && e.y === y)) return false;
    return true;
  }

  function randomCell(opts) {
    let tries = 0;
    while (tries++ < 2000) {
      const x = 1 + Math.floor(Math.random() * (COLS - 2));
      const y = 1 + Math.floor(Math.random() * (ROWS - 2));
      if (cellFree(x, y, opts)) {
        if (opts && opts.minDistFromHead && snake && snake.length) {
          const h = snake[0];
          if (Math.abs(h.x - x) + Math.abs(h.y - y) < opts.minDistFromHead) continue;
        }
        return { x, y };
      }
    }
    return null;
  }

  function spawnFood() {
    const c = randomCell({});
    if (c) food = c;
  }

  function spawnEnemy() {
    const c = randomCell({ minDistFromHead: 8 });
    if (c) enemies.push({ x: c.x, y: c.y });
  }

  function reset() {
    buildWalls();
    // Ular start di baris tengah (baris ini sengaja dibuat bebas obstacle)
    const midY = Math.floor(ROWS / 2);
    snake = [
      { x: 6, y: midY },
      { x: 5, y: midY },
      { x: 4, y: midY },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    enemies = [];
    food = null;
    score = 0;
    level = 1;
    foodEaten = 0;
    stepMs = START_STEP_MS;
    acc = 0;
    lastTs = 0;
    tickCount = 0;

    spawnFood();
    for (let i = 0; i < 3; i++) spawnEnemy();   // mulai dengan 3 musuh

    updateHud();
  }

  function updateHud() {
    el.score.textContent = score;
    el.high.textContent = high;
    el.level.textContent = level;
    el.enemies.textContent = enemies.length;
  }

  // ---------- Gerak musuh: acak tapi selalu ke sel valid (possible) ----------
  function moveEnemies() {
    const DIRS = [
      { x: 1, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 },
    ];
    // Tandai posisi musuh lain supaya tidak saling menumpuk
    for (const e of enemies) {
      const options = [];
      for (const d of DIRS) {
        const nx = e.x + d.x, ny = e.y + d.y;
        if (!inBounds(nx, ny) || isWall(nx, ny)) continue;                 // tak boleh tembus tembok/obstacle
        if (enemies.some(o => o !== e && o.x === nx && o.y === ny)) continue; // tak menumpuk musuh lain
        if (snake.some(s => s.x === nx && s.y === ny)) continue;            // tak menabrak ular (fair): musuh = rintangan bergerak
        options.push({ x: nx, y: ny });
      }
      // Bila terkurung, diam di tempat
      if (options.length === 0) continue;
      // 20% kemungkinan diam agar gerak tidak terlalu liar
      if (Math.random() < 0.2) continue;
      const pick = options[Math.floor(Math.random() * options.length)];
      e.x = pick.x;
      e.y = pick.y;
    }
  }

  function hitsEnemy(x, y) {
    return enemies.some(e => e.x === x && e.y === y);
  }

  // ---------- Satu langkah simulasi ----------
  function step() {
    dir = nextDir;
    const head = snake[0];
    const nx = head.x + dir.x;
    const ny = head.y + dir.y;

    // Tabrak tembok / obstacle
    if (!inBounds(nx, ny) || isWall(nx, ny)) return gameOver();
    // Tabrak badan sendiri (ekor akan bergerak, jadi abaikan sel ekor jika tidak makan)
    const willGrow = food && nx === food.x && ny === food.y;
    const body = willGrow ? snake : snake.slice(0, -1);
    if (body.some(s => s.x === nx && s.y === ny)) return gameOver();
    // Tabrak musuh
    if (hitsEnemy(nx, ny)) return gameOver();

    snake.unshift({ x: nx, y: ny });

    if (willGrow) {
      score += 10;
      foodEaten++;
      spawnFood();
      // Naik level tiap 4 buah: percepat & tambah musuh
      if (foodEaten % 4 === 0) {
        level++;
        stepMs = Math.max(MIN_STEP_MS, stepMs - 8);
        if (enemies.length < 8) spawnEnemy();
      }
    } else {
      snake.pop();
    }

    // Musuh bergerak lebih lambat dari ular
    tickCount++;
    if (tickCount % ENEMY_EVERY === 0) {
      moveEnemies();
      // Setelah musuh bergerak, cek apakah menabrak ular
      const h = snake[0];
      if (hitsEnemy(h.x, h.y)) return gameOver();
    }

    updateHud();
  }

  function gameOver() {
    state = "over";
    if (score > high) {
      high = score;
      localStorage.setItem("retroSnakeHigh", String(high));
    }
    el.ovTitle.textContent = "GAME OVER";
    el.ovTitle.classList.add("dead");
    el.ovText.innerHTML = `SCORE: <b style="color:var(--amber)">${score}</b> &nbsp;&middot;&nbsp; HIGH: <b style="color:var(--amber)">${high}</b><br>Level tercapai: ${level}`;
    el.ovHint.textContent = "TEKAN ENTER / KLIK UNTUK MAIN LAGI";
    el.overlay.classList.remove("hidden");
    updateHud();
  }

  // ---------- Render ----------
  function drawCell(x, y, color, inset = 2, glow = 0) {
    if (glow) {
      ctx.shadowColor = color;
      ctx.shadowBlur = glow;
    }
    ctx.fillStyle = color;
    ctx.fillRect(x * CELL + inset, y * CELL + inset, CELL - inset * 2, CELL - inset * 2);
    ctx.shadowBlur = 0;
  }

  function draw() {
    // Latar
    ctx.fillStyle = "#071d0d";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid samar
    ctx.strokeStyle = "rgba(57,255,138,0.05)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 0; x <= COLS; x++) { ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, ROWS * CELL); }
    for (let y = 0; y <= ROWS; y++) { ctx.moveTo(0, y * CELL); ctx.lineTo(COLS * CELL, y * CELL); }
    ctx.stroke();

    // Tembok & obstacle
    for (const k of walls) {
      const [x, y] = k.split(",").map(Number);
      ctx.fillStyle = "#123d1f";
      ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
      ctx.fillStyle = "#2fa34d";
      ctx.fillRect(x * CELL + 2, y * CELL + 2, CELL - 4, CELL - 4);
      ctx.fillStyle = "#1a5c2b";
      ctx.fillRect(x * CELL + 5, y * CELL + 5, CELL - 10, CELL - 10);
    }

    // Buah (berkedip halus)
    if (food) {
      const pulse = 6 + Math.sin(Date.now() / 150) * 4;
      drawCell(food.x, food.y, "#ffcf3f", 3, pulse);
    }

    // Musuh (berkedip merah)
    const blink = Math.floor(Date.now() / 250) % 2 === 0;
    for (const e of enemies) {
      drawCell(e.x, e.y, blink ? "#ff3b6b" : "#c81f4c", 2, 8);
      // "mata" musuh
      ctx.fillStyle = "#2a0009";
      ctx.fillRect(e.x * CELL + 6, e.y * CELL + 7, 3, 3);
      ctx.fillRect(e.x * CELL + CELL - 9, e.y * CELL + 7, 3, 3);
    }

    // Ular
    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      if (i === 0) {
        drawCell(s.x, s.y, "#b6ffcf", 1, 10);   // kepala
      } else {
        const t = 1 - i / (snake.length + 4);
        const g = Math.floor(120 + 135 * t);
        drawCell(s.x, s.y, `rgb(40,${g},110)`, 2, 4);
      }
    }
  }

  // ---------- Loop ----------
  function loop(ts) {
    if (!lastTs) lastTs = ts;
    // Batasi dt: jika tab sempat ter-throttle / di-background, jangan biarkan
    // ular "teleport" berkejar-kejaran langkah dalam satu frame.
    const dt = Math.min(ts - lastTs, stepMs * 2);
    lastTs = ts;

    if (state === "playing") {
      acc += dt;
      while (acc >= stepMs) {
        acc -= stepMs;
        step();
        if (state !== "playing") break;
      }
    }
    draw();
    requestAnimationFrame(loop);
  }

  // ---------- Kontrol ----------
  function setDir(x, y) {
    // Cegah balik arah 180 derajat
    if (x === -dir.x && y === -dir.y) return;
    nextDir = { x, y };
  }

  function startGame() {
    reset();
    el.ovTitle.classList.remove("dead");
    el.overlay.classList.add("hidden");
    state = "playing";
  }

  function togglePause() {
    if (state === "playing") {
      state = "paused";
      el.ovTitle.textContent = "PAUSED";
      el.ovTitle.classList.remove("dead");
      el.ovText.innerHTML = "Permainan dijeda.";
      el.ovHint.textContent = "TEKAN SPACE / ENTER UNTUK LANJUT";
      el.overlay.classList.remove("hidden");
    } else if (state === "paused") {
      el.overlay.classList.add("hidden");
      state = "playing";
    }
  }

  window.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (["arrowup","arrowdown","arrowleft","arrowright"," "].includes(e.key.toLowerCase())) e.preventDefault();

    if (k === "arrowup" || k === "w")    setDir(0, -1);
    else if (k === "arrowdown" || k === "s")  setDir(0, 1);
    else if (k === "arrowleft" || k === "a")  setDir(-1, 0);
    else if (k === "arrowright" || k === "d") setDir(1, 0);
    else if (k === " ") { if (state === "playing" || state === "paused") togglePause(); }
    else if (k === "enter") {
      if (state === "ready" || state === "over") startGame();
      else if (state === "paused") togglePause();
    }
  });

  // Klik / sentuh layar untuk mulai / ulang
  el.overlay.addEventListener("click", () => {
    if (state === "ready" || state === "over") startGame();
    else if (state === "paused") togglePause();
  });

  // Swipe untuk perangkat sentuh
  let touchStart = null;
  canvas.addEventListener("touchstart", (e) => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  canvas.addEventListener("touchmove", (e) => {
    if (!touchStart) return;
    const dx = e.touches[0].clientX - touchStart.x;
    const dy = e.touches[0].clientY - touchStart.y;
    if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
    else setDir(0, dy > 0 ? 1 : -1);
    touchStart = null;
    e.preventDefault();
  }, { passive: false });

  // ---------- Mulai ----------
  reset();
  state = "ready";
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
